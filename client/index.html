<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Foto Booth</title>
    <style>
      @font-face {
        font-family: 'Bebas Neue';
        font-style: normal; font-weight: 400; font-display: swap;
        src: url('/fotobooth/fonts/bebas-neue-latin-ext.woff2') format('woff2');
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: 'Bebas Neue';
        font-style: normal; font-weight: 400; font-display: swap;
        src: url('/fotobooth/fonts/bebas-neue-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Cormorant Garamond';
        font-style: normal; font-weight: 300; font-display: swap;
        src: url('/fotobooth/fonts/cormorant-300-latin.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Cormorant Garamond';
        font-style: italic; font-weight: 300; font-display: swap;
        src: url('/fotobooth/fonts/cormorant-italic-300-latin.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal; font-weight: 300 600; font-display: swap;
        src: url('/fotobooth/fonts/inter-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
